<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Session Note</title>
    <a href="{% url 'export_session_report' appointment.appointment_id %}" class="btn btn-primary mt-3">
        📄 Export Session Report PDF
    </a>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

    <div class="container mt-5">

        <div class="card shadow">

            <div class="card-header bg-primary text-white">

                <h3>Session Note</h3>

            </div>

            <div class="card-body">

                <h5>Student</h5>

                <p>{{ appointment.student.username }}</p>

                <hr>

                <h5>Appointment Date</h5>

                <p>{{ appointment.appointment_date }}</p>

                <hr>

                <h5>Session Notes</h5>

                <p>{{ note.notes }}</p>

                <hr>

                <h5>Recommendations</h5>

                <p>{{ note.recommendations }}</p>

                <hr>

                <h5>Follow-up Date</h5>

                <p>{{ note.follow_up_date }}</p>

                <hr>

                <a href="{% url 'appointment_list' %}" class="btn btn-primary">

                    Back to Appointments

                </a>

            </div>

        </div>

    </div>

</body>

</html>
