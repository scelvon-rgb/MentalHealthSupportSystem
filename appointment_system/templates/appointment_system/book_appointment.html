<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Book Appointment</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

</head>

<body style="background:#f4f7fc;font-family:'Poppins',sans-serif;">

    <nav class="navbar navbar-dark bg-primary shadow">

        <div class="container">

            <a class="navbar-brand fw-bold">

                🧠 Mental Health Support System

            </a>

            <a href="{% url 'dashboard' %}" class="btn btn-light">

                Dashboard

            </a>

        </div>

    </nav>

    <div class="container mt-5">

        <div class="row justify-content-center">

            <div class="col-lg-7">

                <div class="card shadow-lg border-0 rounded-4">

                    <div class="card-body p-5">

                        <div class="text-center mb-4">

                            <h1>📅</h1>

                            <h2 class="fw-bold text-primary">

                                Book a Counselling Appointment

                            </h2>

                            <p class="text-muted">

                                Complete the form below to request an appointment with a counsellor.

                            </p>

                        </div>

                        <form method="POST">

                            {% csrf_token %}

                            {{ form.as_p }}

                            <div class="d-grid mt-4">

                                <button type="submit" class="btn btn-success btn-lg">

                                    Submit Appointment Request

                                </button>

                            </div>

                        </form>

                        <hr>

                        <div class="text-center">

                            <a href="{% url 'appointment_list' %}" class="btn btn-outline-primary me-2">

                                View My Appointments

                            </a>

                            <a href="{% url 'dashboard' %}" class="btn btn-outline-secondary">

                                Back to Dashboard

                            </a>

                        </div>

                    </div>

                </div>

            </div>

        </div>

    </div>

</body>

</html>
