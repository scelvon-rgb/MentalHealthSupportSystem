<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Create Discussion</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

</head>

<body style="background:#f4f7fc;font-family:'Poppins',sans-serif;">

    <nav class="navbar navbar-dark bg-primary shadow">

        <div class="container">

            <a class="navbar-brand fw-bold" href="{% url 'dashboard' %}">

                🧠 Mental Health Support System

            </a>

            <div>

                <a href="{% url 'forum_list' %}" class="btn btn-light me-2">

                    Forum

                </a>

                <a href="{% url 'dashboard' %}" class="btn btn-warning me-2">

                    Dashboard

                </a>

                <a href="{% url 'logout' %}" class="btn btn-danger">

                    Logout

                </a>

            </div>

        </div>

    </nav>

    <div class="container mt-5">

        <div class="row justify-content-center">

            <div class="col-md-8">

                <div class="card shadow">

                    <div class="card-header bg-success text-white">

                        <h3 class="mb-0">
                            Create Discussion
                        </h3>

                    </div>

                    <div class="card-body">

                        <form method="POST">

                            {% csrf_token %}

                            {{ form.as_p }}

                            <button type="submit" class="btn btn-success">

                                Post Discussion

                            </button>

                            <a href="{% url 'forum_list' %}" class="btn btn-secondary">

                                Cancel

                            </a>

                        </form>

                    </div>

                </div>

            </div>

        </div>

    </div>

</body>

</html>
