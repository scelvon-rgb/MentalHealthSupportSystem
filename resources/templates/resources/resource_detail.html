<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ resource.title }}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

    <div class="container mt-5">

        <a href="{% url 'resource_list' %}" class="btn btn-secondary mb-4">
            ← Back to Resources
        </a>

        <div class="card shadow">

            <div class="card-body">

                <h2>{{ resource.title }}</h2>

                <p class="text-muted">
                    <strong>Category:</strong> {{ resource.category }}
                </p>

                <hr>

                <h4>Description</h4>

                <p>{{ resource.description }}</p>

                <hr>

                <h4>Content</h4>

                <div>
                    {{ resource.content|linebreaks }}
                </div>

                {% if resource.resource_file %}
                <hr>

                <a href="{{ resource.resource_file.url }}" class="btn btn-success" target="_blank">
                    Download Attachment
                </a>

                {% endif %}

                {% if is_admin %}
                <hr>

                <a href="{% url 'edit_resource' resource.id %}" class="btn btn-warning">
                    Edit
                </a>

                <a href="{% url 'delete_resource' resource.id %}" class="btn btn-danger">
                    Delete
                </a>

                {% endif %}

            </div>

        </div>

    </div>

</body>

</html>
