<!DOCTYPE html>
<html>

<head>
    <title>Password Reset Sent</title>

</head>

<body style="background:#f4f7fc;">

    <div class="container mt-5" style="max-width:500px;">

        <div class="card shadow p-4 text-center">

            <a href="{% url 'login' %}" class="btn btn-primary">

        </div>

    </div>

</body>

</html>
