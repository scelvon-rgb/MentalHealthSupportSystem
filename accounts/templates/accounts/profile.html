<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>My Profile</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

</head>

<body style="background:#f4f7fc;">

    <div class="container mt-5">

        <div class="row justify-content-center">

            <div class="col-lg-8">

                <div class="card shadow-lg border-0 rounded-4">

                    <div class="card-body p-5">

                        <h2 class="text-center text-primary mb-4">
                            <i class="bi bi-person-circle"></i>
                            My Profile
                        </h2>

                        <form method="POST" enctype="multipart/form-data">

                            {% csrf_token %}

                            <div class="text-center mb-4">

                                {% if profile.profile_picture %}

                                <img src="{{ profile.profile_picture.url }}" class="rounded-circle shadow" width="170"
                                    height="170">

                                {% else %}

                                <img src="https://cdn-icons-png.flaticon.com/512/149/149071.png"
                                    class="rounded-circle shadow" width="170" height="170">

                                {% endif %}

                            </div>

                            <div class="mb-3">
                                <label class="form-label fw-bold">
                                    Profile Picture
                                </label>

                                {{ form.profile_picture }}
                            </div>

                            <div class="mb-3">
                                <label class="form-label fw-bold">
                                    First Name
                                </label>

                                <input type="text" class="form-control" value="{{ request.user.first_name }}" disabled>
                            </div>

                            <div class="mb-3">
                                <label class="form-label fw-bold">
                                    Last Name
                                </label>

                                <input type="text" class="form-control" value="{{ request.user.last_name }}" disabled>
                            </div>

                            <div class="mb-3">
                                <label class="form-label fw-bold">
                                    Username
                                </label>

                                <input type="text" class="form-control" value="{{ request.user.username }}" disabled>
                            </div>

                            <div class="mb-3">
                                <label class="form-label fw-bold">
                                    Email
                                </label>

                                <input type="email" class="form-control" value="{{ request.user.email }}" disabled>
                            </div>

                            <div class="mb-3">

                                <label class="form-label fw-bold">

                                    Phone Number

                                </label>

                                {{ form.phone }}

                            </div>



                            <div class="d-grid">

                                <button class="btn btn-success btn-lg">

                                    <i class="bi bi-save"></i>

                                    Save Changes

                                </button>

                            </div>

                        </form>

                        <hr>

                        <div class="text-center">

                            <a href="{% url 'dashboard' %}" class="btn btn-primary">

                                <i class="bi bi-speedometer2"></i>

                                Back to Dashboard

                            </a>

                        </div>

                    </div>

                </div>

            </div>

        </div>

    </div>

</body>

</html>
