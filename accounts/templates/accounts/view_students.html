<!DOCTYPE html>
<html>

<head>

    <title>Student Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

    <nav class="navbar navbar-dark bg-primary">

        <div class="container-fluid">

            <span class="navbar-brand">
                Mental Health Support System
            </span>

            <a href="{% url 'logout' %}" class="btn btn-light">
                Logout
            </a>

        </div>

    </nav>

    <div class="container mt-4">

        <h2>Welcome, {{ request.user.first_name }}</h2>

        <p class="text-muted">
            Student Dashboard
        </p>

        <div class="row">

            <div class="col-md-3 mb-3">

                <div class="card text-bg-primary">

                    <div class="card-body text-center">

                        <h2>{{ total }}</h2>

                        <p>Total Appointments</p>

                    </div>

                </div>

            </div>

            <div class="col-md-3 mb-3">

                <div class="card text-bg-warning">

                    <div class="card-body text-center">

                        <h2>{{ pending }}</h2>

                        <p>Pending</p>

                    </div>

                </div>

            </div>

            <div class="col-md-3 mb-3">

                <div class="card text-bg-success">

                    <div class="card-body text-center">

                        <h2>{{ approved }}</h2>

                        <p>Approved</p>

                    </div>

                </div>

            </div>

            <div class="col-md-3 mb-3">

                <div class="card text-bg-danger">

                    <div class="card-body text-center">

                        <h2>{{ rejected }}</h2>

                        <p>Rejected</p>

                    </div>

                </div>

            </div>

        </div>

        <div class="card mt-4">

            <div class="card-header">

                Quick Actions

            </div>

            <div class="card-body">

                <a href="{% url 'book_appointment' %}" class="btn btn-primary">

                    Book Appointment

                </a>

                <a href="/mood/check/" class="btn btn-success">

                    Daily Mood Check-In

                </a>

                <a href="/mood/history/" class="btn btn-info">

                    Mood History

                </a>

                <a href="{% url 'appointment_list' %}" class="btn btn-secondary">

                    My Appointments

                </a>

            </div>

        </div>

    </div>

</body>

</html>
