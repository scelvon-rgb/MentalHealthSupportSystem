<!DOCTYPE html>
<html>

<head>

    <title>Student Mood History</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

    <div class="container mt-5">

        <div class="card shadow">

            <div class="card-header bg-success text-white">

                <h3>
                    Mood History for
                    {{ student.user.first_name }}
                    {{ student.user.last_name }}
                </h3>

            </div>

            <div class="card-body">

                {% if moods %}

                <table class="table table-bordered">

                    <thead class="table-dark">

                        <tr>

                            <th>Date</th>
                            <th>Mood</th>
                            <th>Notes</th>

                        </tr>

                    </thead>

                    <tbody>

                        {% for mood in moods %}

                        <tr>

                            <td>{{ mood.created_at }}</td>

                            <td>{{ mood.mood }}</td>

                            <td>{{ mood.notes }}</td>

                        </tr>

                        {% endfor %}

                    </tbody>

                </table>

                {% else %}

                <div class="alert alert-warning">

                    This student has not submitted any mood entries.

                </div>

                {% endif %}

                <a href="{% url 'view_students' %}" class="btn btn-secondary">

                    Back

                </a>

            </div>

        </div>

    </div>

</body>

</html>
